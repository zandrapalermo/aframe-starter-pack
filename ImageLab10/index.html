<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene> 

      <a-assets>
        <img id="sky" src="assets/eqisky.jpg">
        <img id="sand" src="assets/sand.jpg">
        <img id="fibsh" src="assets/hugh.jpg">
        <img id="bubble" src="assets/fishybubble.jpg">
        <img id="goldfish" src="assets/goldfish.png">
        <img id="sunfish" src="assets/sunfish.jpg">
      </a-assets>

      <a-box position="-1 0.5 -3" rotation="0 45 0"  src="#goldfish"></a-box>
      <a-box position="-1 3 -4" rotation="0 45 0"  src="#sunfish"></a-box>
      <a-sphere position="0 1.25 -5" rotation="0 -95 0" radius="1.25" src="#bubble"></a-sphere>
      <a-cylinder position="1 0.75 -3" rotation="0 188 0" radius="0.5" height="1.5" src="#fibsh"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="40" height="40" src="#sand"></a-plane>
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
