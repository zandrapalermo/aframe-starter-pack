<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-box position="-1 1.8 -4.5" height="0.1" width="0.1" rotation="45 90 0" color="#000000"></a-box>
      <a-box position="1 1.7 -4.5" height="0.1" width="0.1" rotation="45 90 0" color="#000000"></a-box>
      <a-box position="0.1 2.5 -3.8" height="0.1" width="0.1" rotation="0 90 0" color="#000000"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#0000"></a-sphere>
      <a-sphere position="0 3 -5" radius="1.25" color="#0000"></a-sphere>
      <a-sphere position="0 4.2 -5" radius="0.5" color="#FFC65D"></a-sphere>
      <!---<a-cylinder position="0 3 -4.3" rotation="90 0 0" radius="0.3" height="2" color="#FFC65D"></a-cylinder>-->
      <a-cylinder position="0 3.9 -5" radius="0.6" height="0.6" color="#FFC65D"></a-cylinder>
      <a-cylinder position="0 4 -5" radius="0.5" height="0.6" color="#CF3F23"></a-cylinder>
      <a-cylinder position="0.4 3.2 -3.87" radius="0.1" height="0.5" color="#000"></a-cylinder>
      <a-cylinder position="-0.3 3.2 -3.87" radius="0.1" height="0.5" color="#000"></a-cylinder>
      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: japan; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
